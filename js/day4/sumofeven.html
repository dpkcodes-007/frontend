<script>

    let starting_number = 1
    let finishing_number = 20

    //for loop
    let Sumofeven = 0
    for( starting_number ; starting_number <= finishing_number; starting_number++){

          if(starting_number % 2 == 0){
            
            Sumofeven += starting_number

          }
        
    }

    console.log( "the sum of even number is =",Sumofeven);
    
</script>
