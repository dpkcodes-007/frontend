<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="shortcut icon" href="assests/fuelassist_favicon.png" type="image/x-icon">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

<div class="card p-4 shadow-sm w-100 border-0" style="max-width: 400px;">

 <div class="text-center mb-4 mt-3">
    <img src="assests/fuelassist_favicon.png" width="70" alt="Logo" class="mb-3">
    <h3 class="fw-bold">Login!</h3>
    <p class="text-muted">Welcome back to FuelAssist</p>
</div>

<form>
    <div class="mb-3">
        <label for="emailInput" class="form-label fw-semibold">Email address</label>
        <input type="email" id="emailInput" placeholder="Enter your email" class="form-control px-3 py-2" required>
    </div>
    <div class="mb-4">
        <label for="passwordInput" class="form-label fw-semibold">Password</label>
        <input type="password" id="passwordInput" placeholder="Enter your password" class="form-control px-3 py-2" required>
    </div>

    <a href="index.html" class="btn btn-primary w-100 py-2 fw-semibold mb-2">Login</a>
</form>

<div class="text-center mt-3">
    <p class="mb-0 text-muted">Don't have an account? <a href="register.html" class="text-decoration-none fw-bold">Create it here</a></p>
</div>

</div>

</div>

</body>
</html>
